name: Update Esports Scores

on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分钟运行一次
  workflow_dispatch:         # 允许手动触发

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Scores
        run: python scripts/fetch_schedule.py
        env:
          RIOT_ESPORTS_API_KEY: ${{ secrets.RIOT_ESPORTS_API_KEY }}

      - name: Commit and Push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/schedule.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update esports schedule" && git push)
