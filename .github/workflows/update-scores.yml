name: Update Esports Scores

on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分钟运行一次
  workflow_dispatch:         # 允许手动触发

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 googlenewsdecoder selectolax

      - name: Fetch Scores, Standings, News, and Transfers
        run: |
          python scripts/fetch_schedule.py
          python scripts/fetch_standings.py
          python scripts/fetch_teams.py
          python scripts/fetch_news.py
          python scripts/fetch_transfers.py

      - name: Commit and Push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/schedule.json data/standings.json data/teams.json data/players.json data/news.json data/transfers.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update esports schedule, standings, teams rosters, news, and transfers" && git push)
