<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL Esports Hub — Live Scores, Champions & Universe</title>
  <meta name="description" content="Your ultimate League of Legends destination: live esports scores, champion guides, universe lore, and the latest news from LPL, LCK, LEC, and LCS.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <main class="main">
    <!-- Hero -->
    <section class="hero" id="hero">
      <canvas class="hero-canvas" id="heroCanvas"></canvas>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 class="hero-title">League of Legends<br>Esports Hub</h1>
        <p class="hero-subtitle">Live scores, champion intel, universe lore — everything a Summoner needs, all in one place.</p>
        <div class="hero-cta">
          <a href="esports.html" class="btn btn-primary">Live Scores</a>
          <a href="champions.html" class="btn btn-outline">Explore Champions</a>
        </div>
      </div>
    </section>

    <!-- Live Matches -->
    <section class="section" id="live-section">
      <div class="section-header">
        <h2 class="section-title">Latest Matches</h2>
        <a href="esports.html" class="btn btn-outline" style="font-size:0.85rem;padding:0.5rem 1rem;">View All →</a>
      </div>
      <div id="matchList" class="match-list" style="display:flex;flex-direction:column;gap:1rem;">
        <div class="loading"><div class="spinner"></div><p style="margin-top:1rem;">Loading matches...</p></div>
      </div>
    </section>

    <!-- Featured Champions -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Popular Champions</h2>
        <a href="champions.html" class="btn btn-outline" style="font-size:0.85rem;padding:0.5rem 1rem;">All Champions →</a>
      </div>
      <div id="featuredChamps" class="champion-grid"></div>
    </section>

    <!-- News -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Latest News</h2>
      </div>
      <div id="newsGrid" class="news-grid"></div>
    </section>
  </main>

  <script src="js/common.js?v=2"></script>
  <script src="js/esports-api.js?v=2"></script>
  <script src="js/particles.js?v=2"></script>
  <script src="js/home.js?v=2"></script>
</body>
</html>
