<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esports — LoL Esports Hub</title>
  <meta name="description" content="Live League of Legends esports scores, standings, and team rosters for LPL, LCK, LEC, and LCS.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2">
  <!-- Google AdSense Auto Ads -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9267698062788796"
     crossorigin="anonymous"></script>
</head>
<body>
  <main class="main">
    <section class="section" style="padding-top:2rem;">
      <h1 class="section-title" style="font-size:2.2rem;margin-bottom:2rem;">Esports Center</h1>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="schedule" onclick="switchTab('schedule')">Schedule</button>
        <button class="tab-btn" data-tab="standings" onclick="switchTab('standings')">Standings</button>
        <button class="tab-btn" data-tab="teams" onclick="switchTab('teams')">Teams</button>
        <button class="tab-btn" data-tab="rankings" onclick="switchTab('rankings')">World Rankings</button>
      </div>

      <!-- Schedule Tab -->
      <div class="tab-panel active" id="tab-schedule">
        <div class="filter-group" id="leagueFilters" style="margin-bottom:1.5rem;">
          <button class="filter-btn active" data-league="all">All</button>
          <button class="filter-btn" data-league="lpl">LPL</button>
          <button class="filter-btn" data-league="lck">LCK</button>
          <button class="filter-btn" data-league="lec">LEC</button>
          <button class="filter-btn" data-league="lcs">LCS</button>
        </div>
        <div id="scheduleList" style="display:flex;flex-direction:column;gap:1rem;">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Standings Tab -->
      <div class="tab-panel" id="tab-standings">
        <div class="filter-group" id="standingsRegion" style="margin-bottom:1.5rem;">
          <button class="filter-btn active" data-region="LPL">LPL</button>
          <button class="filter-btn" data-region="LCK">LCK</button>
          <button class="filter-btn" data-region="LEC">LEC</button>
          <button class="filter-btn" data-region="LCS">LCS</button>
        </div>
        <div id="standingsTable" class="card" style="overflow-x:auto;"></div>
      </div>

      <!-- Teams Tab -->
      <div class="tab-panel" id="tab-teams">
        <div class="filter-group" id="teamRegionFilters" style="margin-bottom:1.5rem;">
          <button class="filter-btn active" data-region="all">All</button>
          <button class="filter-btn" data-region="LPL">LPL</button>
          <button class="filter-btn" data-region="LCK">LCK</button>
          <button class="filter-btn" data-region="LEC">LEC</button>
          <button class="filter-btn" data-region="LCS">LCS</button>
        </div>
        <div id="teamsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;"></div>
      </div>

      <!-- World Rankings Tab -->
      <div class="tab-panel" id="tab-rankings">
        <div class="filter-group" id="rankingsRegionFilters" style="margin-bottom:1.5rem;">
          <button class="filter-btn active" data-region="all">All</button>
          <button class="filter-btn" data-region="LPL">LPL</button>
          <button class="filter-btn" data-region="LCK">LCK</button>
          <button class="filter-btn" data-region="LEC">LEC</button>
          <button class="filter-btn" data-region="LCS">LCS</button>
        </div>
        <div id="rankingsContainer" class="card" style="padding:1.5rem; overflow-x:auto;">
          <div class="loading"><div class="spinner"></div><p style="margin-top:1rem;">Loading world rankings...</p></div>
        </div>
      </div>
    </section>
  </main>
  <script src="js/common.js?v=2"></script>
  <script src="js/esports-api.js?v=2"></script>
  <script src="js/esports.js?v=2"></script>
</body>
</html>
